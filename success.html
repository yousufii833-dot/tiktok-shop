<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الدفع بنجاح | TikTok Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Cairo', 'Segoe UI', system-ui;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            direction: rtl;
        }
        .success-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            border: 1px solid rgba(0,242,234,0.3);
        }
        .success-icon { font-size: 80px; margin-bottom: 20px; }
        h1 { color: #00f2ea; font-size: 32px; margin-bottom: 16px; }
        p { color: #a0aec0; margin-bottom: 10px; }
        .btn-home {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 35px;
            background: linear-gradient(135deg, #00f2ea, #00b8b3);
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="success-card">
    <div class="success-icon">✓</div>
    <h1>تم الدفع بنجاح</h1>
    <p>سيتم إضافة العملات إلى حساب تيك توك الخاص بك خلال 5-10 دقائق</p>
    <p>تم إرسال إيصال الدفع إلى بريدك الإلكتروني</p>
    <a href="/" class="btn-home">العودة للرئيسية</a>
</div>
</body>
</html>
